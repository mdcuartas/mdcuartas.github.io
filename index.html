<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MD Cuartas Healthcare Concierge</title>
  <style>
    /* Estilos base */
    body { margin: 0; font-family: sans-serif; color: #1E426F; background: #fff; }
    ul { list-style: none; margin: 0; padding: 0; }
    a { text-decoration: none; color: inherit; }

    /* Barra Superior con Logo y Botones */
    .header-main { display: flex; align-items: center; justify-content: space-between; padding: 20px 5%; }
    .logo-container { display: flex; align-items: center; gap: 10px; }
    .logo-container img { height: 50px; width: auto; }
    .header-actions { display: flex; align-items: center; gap: 15px; }
    .explore-plans { background-color: #1E426F; color: #fff; padding: 10px 20px; border-radius: 5px; font-weight: bold; }
    .explore-plans:hover { background-color: #0d2c54; }
    .whatsapp-icon img { height: 40px; width: auto; }

    /* Barra Inferior con Menú en Azul Oscuro */
    .nav-main { background-color: #1E426F; color: #fff; padding: 15px 5%; }
    .nav-links { display: flex; justify-content: start; gap: 30px; font-weight: bold; text-transform: uppercase; }
    .nav-links a:hover { color: #FFE366; }

    /* Sección de Bienvenida */
    .welcome { display: grid; grid-template-columns: 1fr 1fr; align-items: center; padding: 50px 5%; gap: 50px; background: #fff; }
    .welcome-text h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 4.5vw, 3.8rem); line-height: 1.12; color: #1E426F; margin-bottom: 1.4rem; }
    .welcome-text h1::after { content: " | "; color: #3A91FF; font-weight: normal; } /* Línea azul vertical */
    .dental-image img { width: 100%; height: auto; display: block; border-radius: 10px; }

    /* Barra de Conexión en Azul Claro */
    .connection-bar { background-color: #3A91FF; color: #fff; text-align: center; padding: 25px 5%; font-size: 1.2rem; font-weight: bold; }

    /* Media queries para móvil */
    @media (max-width: 768px) {
      .header-main, .nav-main { padding: 10px 20px; flex-direction: column; text-align: center; }
      .header-actions { margin-top: 15px; flex-direction: column; gap: 10px; }
      .nav-links { flex-wrap: wrap; justify-content: center; gap: 15px; }
      .welcome { grid-template-columns: 1fr; text-align: center; }
    }
  </style>
</head>
<body>

  <header class="header-main">
    <div class="logo-container">
      <img src="logo.png" alt="MD Cuartas Logo" /> <span>HEALTHCARE CONCIERGE</span>
    </div>
    <div class="header-actions">
      <a href="#plans" class="explore-plans">Explore plans</a>
      <a href="https://wa.me/tu_numero_de_telefono_aqui?text=Hello,%20I%20want%20information%20about%20medical%20appointments%20in%20Colombia" target="_blank" class="whatsapp-icon">
        <img src="https://mdcuartas.github.io/whatsapp-icon.png" alt="WhatsApp" /> </a>
    </div>
  </header>

  <nav class="nav-main">
    <ul class="nav-links">
      <li><a href="#about">About Us</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#cities">Cities</a></li> <li><a href="#contact">Contact Us</a></li>
    </ul>
  </nav>

  <section class="welcome">
    <div class="welcome-text">
      <h1>Welcome to MD Cuartas healthcare concierge</h1>
    </div>
    <div class="dental-image">
      <img src="dental-image.jpg" alt="Dental Care" /> </div>
  </section>

  <div class="connection-bar">
    We connect you with elite, certified medical and dental specialists in Medellín and Rionegro
  </div>

</body>
</html>
